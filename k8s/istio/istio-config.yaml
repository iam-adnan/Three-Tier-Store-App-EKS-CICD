---
# ═══════════════════════════════════════════════════════════
# Istio Gateway — entry point for all external traffic
# ═══════════════════════════════════════════════════════════
apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: shopwave-gateway
  namespace: shopwave
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*"

---
# ═══════════════════════════════════════════════════════════
# VirtualService — routes traffic to each microservice
# ═══════════════════════════════════════════════════════════
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: shopwave-routes
  namespace: shopwave
spec:
  hosts:
    - "*"
  gateways:
    - shopwave-gateway
  http:
    - match:
        - uri:
            prefix: /api/products
      route:
        - destination:
            host: product-service
            port:
              number: 8000
      timeout: 10s
      retries:
        attempts: 3
        perTryTimeout: 3s
        retryOn: 5xx,reset,connect-failure

    - match:
        - uri:
            prefix: /api/carts
      route:
        - destination:
            host: cart-service
            port:
              number: 8000
      timeout: 10s
      retries:
        attempts: 3
        perTryTimeout: 3s
        retryOn: 5xx,reset,connect-failure

    - match:
        - uri:
            prefix: /api/orders
      route:
        - destination:
            host: order-service
            port:
              number: 8000
      timeout: 30s
      retries:
        attempts: 2
        perTryTimeout: 10s
        retryOn: 5xx,reset,connect-failure

    - match:
        - uri:
            prefix: /api/payments
      route:
        - destination:
            host: payment-service
            port:
              number: 8000
      timeout: 30s
      retries:
        attempts: 1
        perTryTimeout: 25s

---
# ═══════════════════════════════════════════════════════════
# DestinationRule — circuit breaker for product-service
# ═══════════════════════════════════════════════════════════
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: product-service-dr
  namespace: shopwave
spec:
  host: product-service
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 50
        http2MaxRequests: 100
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
    loadBalancer:
      simple: LEAST_CONN
  subsets:
    - name: v1
      labels:
        version: v1

---
# ═══════════════════════════════════════════════════════════
# DestinationRule — circuit breaker for cart-service
# ═══════════════════════════════════════════════════════════
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: cart-service-dr
  namespace: shopwave
spec:
  host: cart-service
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 50
        http2MaxRequests: 100
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
    loadBalancer:
      simple: ROUND_ROBIN
  subsets:
    - name: v1
      labels:
        version: v1

---
# ═══════════════════════════════════════════════════════════
# DestinationRule — circuit breaker for order-service
# ═══════════════════════════════════════════════════════════
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: order-service-dr
  namespace: shopwave
spec:
  host: order-service
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 50
      http:
        http1MaxPendingRequests: 25
        http2MaxRequests: 50
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 30s
      baseEjectionTime: 60s
      maxEjectionPercent: 30
    loadBalancer:
      simple: LEAST_CONN
  subsets:
    - name: v1
      labels:
        version: v1

---
# ═══════════════════════════════════════════════════════════
# DestinationRule — circuit breaker for payment-service
# ═══════════════════════════════════════════════════════════
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: payment-service-dr
  namespace: shopwave
spec:
  host: payment-service
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 30
      http:
        http1MaxPendingRequests: 10
        http2MaxRequests: 30
    outlierDetection:
      consecutive5xxErrors: 2
      interval: 60s
      baseEjectionTime: 120s
      maxEjectionPercent: 25
    loadBalancer:
      simple: LEAST_CONN
  subsets:
    - name: v1
      labels:
        version: v1

---
# ═══════════════════════════════════════════════════════════
# PeerAuthentication — enforce mTLS between all services
# ═══════════════════════════════════════════════════════════
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: shopwave-mtls
  namespace: shopwave
spec:
  mtls:
    mode: PERMISSIVE
