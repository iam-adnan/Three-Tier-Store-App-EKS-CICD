---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: shopwave-eks
        env: production

    # ── Alertmanager ──────────────────────────────────────
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager:9093']

    # ── Alert rules ───────────────────────────────────────
    rule_files:
      - /etc/prometheus/rules/*.yaml

    # ── Scrape configs ────────────────────────────────────
    scrape_configs:

      # Scrape Prometheus itself
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']

      # Scrape all shopwave services via Kubernetes service discovery
      - job_name: shopwave-services
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [shopwave]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: (product|cart|order|payment|api)-service
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: service
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
        metrics_path: /metrics

      # Istio sidecar (Envoy) metrics
      - job_name: istio-envoy
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [shopwave]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_container_name]
            action: keep
            regex: istio-proxy
        metrics_path: /stats/prometheus
        static_configs:
          - targets: ['localhost:15090']

      # Kubernetes nodes
      - job_name: kubernetes-nodes
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

      # Kubernetes pods
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)

  # ── Alert Rules ───────────────────────────────────────────────────────────
  shopwave-alerts.yaml: |
    groups:
      - name: shopwave.service.availability
        interval: 30s
        rules:

          # Service is completely down
          - alert: ServiceDown
            expr: up{job="shopwave-services"} == 0
            for: 1m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: "{{ $labels.service }} is DOWN"
              description: "Service {{ $labels.service }} has been unreachable for > 1 minute."
              runbook: "https://wiki.shopwave.io/runbooks/service-down"

          # High error rate
          - alert: HighErrorRate
            expr: |
              (
                rate(http_requests_total{status=~"5..",job="shopwave-services"}[5m])
                /
                rate(http_requests_total{job="shopwave-services"}[5m])
              ) > 0.05
            for: 2m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: "High error rate on {{ $labels.service }}"
              description: "Error rate is {{ $value | humanizePercentage }} on {{ $labels.service }}."

          # Critical error rate
          - alert: CriticalErrorRate
            expr: |
              (
                rate(http_requests_total{status=~"5..",job="shopwave-services"}[5m])
                /
                rate(http_requests_total{job="shopwave-services"}[5m])
              ) > 0.25
            for: 1m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: "CRITICAL error rate on {{ $labels.service }}"
              description: "Error rate is {{ $value | humanizePercentage }} — immediate action required."

          # High latency
          - alert: HighLatency
            expr: |
              histogram_quantile(0.95,
                rate(http_request_duration_seconds_bucket{job="shopwave-services"}[5m])
              ) > 2.0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High p95 latency on {{ $labels.service }}"
              description: "p95 latency is {{ $value }}s on {{ $labels.service }}."

          # Pod crash looping
          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total{namespace="shopwave"}[15m]) * 60 > 3
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.pod }} is crash looping"
              description: "Pod {{ $labels.pod }} restarted {{ $value }} times in 15 minutes."

          # HPA at max replicas
          - alert: HPAMaxReplicas
            expr: |
              kube_horizontalpodautoscaler_status_current_replicas{namespace="shopwave"}
              ==
              kube_horizontalpodautoscaler_spec_max_replicas{namespace="shopwave"}
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "HPA {{ $labels.horizontalpodautoscaler }} at max replicas"
              description: "Consider increasing maxReplicas — service is fully scaled out."

      - name: shopwave.payment.alerts
        rules:
          # Payment failure rate too high
          - alert: PaymentFailureRateHigh
            expr: |
              rate(http_requests_total{service="payment-service",status="402"}[10m])
              /
              rate(http_requests_total{service="payment-service"}[10m])
              > 0.10
            for: 5m
            labels:
              severity: critical
              team: payments
            annotations:
              summary: "Payment failure rate above 10%"
              description: "Payment failure rate is {{ $value | humanizePercentage }}. Check payment provider."
